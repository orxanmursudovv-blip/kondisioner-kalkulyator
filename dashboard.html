<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Analitika Paneli</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1720">
<link rel="apple-touch-icon" href="icon-192.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root{
    --bg:#0f1720;
    --panel:#16212c;
    --panel-2:#1c2b38;
    --line:#28394a;
    --text:#e8eef2;
    --muted:#8ea3b4;
    --accent:#3fb68a;
    --warn:#e0a83a;
    --danger:#e05a4e;
    --mono: 'SF Mono', 'Consolas', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    padding:20px 14px 60px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  header{margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  header .eyebrow{
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--accent);text-transform:uppercase;
  }
  h1{font-size:21px;margin:6px 0 2px;font-weight:650;letter-spacing:-.01em;}
  header p{margin:0;color:var(--muted);font-size:13.5px;}
  .nav-link{
    font-size:12px;color:var(--accent);text-decoration:none;border:1px solid var(--line);
    padding:6px 10px;border-radius:8px;white-space:nowrap;font-family:var(--mono);
  }

  .kpi-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:10px;
    margin-bottom:14px;
  }
  .kpi{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
  }
  .kpi .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
  .kpi .value{font-family:var(--mono);font-size:20px;font-weight:700;}
  .kpi .value.good{color:var(--accent);}
  .kpi .value.bad{color:var(--danger);}

  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px;
    margin-bottom:14px;
  }
  .card h2{
    font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:0 0 12px;font-weight:600;
  }
  .chart-wrap{position:relative;height:220px;}

  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th, td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line);}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;}
  td.num{font-family:var(--mono);}
  tr.best{background:rgba(63,182,138,.08);}
  tr.worst{background:rgba(224,90,78,.08);}
  .tag{font-size:10px;padding:2px 6px;border-radius:5px;font-family:var(--mono);}
  .tag.best{background:rgba(63,182,138,.18);color:var(--accent);}
  .tag.worst{background:rgba(224,90,78,.18);color:var(--danger);}

  .btn{
    padding:10px 14px;border-radius:9px;border:1px solid var(--line);background:var(--panel-2);
    color:var(--text);font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;
  }
  .empty{color:var(--muted);font-size:13.5px;text-align:center;padding:30px 10px;}

  .filter-bar{
    display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap;
  }
  .filter-bar label{font-size:12px;color:var(--muted);}
  select#sectorFilter{
    background:var(--panel); border:1px solid var(--line); color:var(--text);
    padding:8px 10px; border-radius:8px; font-size:13px; font-family:inherit; flex:1; min-width:140px;
  }
  .clear-filter{
    font-size:11.5px; color:var(--accent); background:none; border:none; cursor:pointer;
    font-family:inherit; text-decoration:underline; padding:4px;
  }
  tbody tr{cursor:pointer;}
  tbody tr:hover{background:rgba(255,255,255,.03);}

  @media (max-width:400px){
    .kpi .value{font-size:17px;}
    table{font-size:11px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="eyebrow">universal · reklam analitikası</div>
      <h1>Analitika Paneli</h1>
      <p>Bütün saxlanmış kampaniyaların ümumi mənzərəsi.</p>
    </div>
    <a class="nav-link" href="index.html">← Kalkulyator</a>
  </header>

  <div class="filter-bar" id="filterBar" style="display:none;">
    <label for="sectorFilter">Sahə:</label>
    <select id="sectorFilter">
      <option value="">Hamısı</option>
    </select>
    <button class="clear-filter" id="clearFilterBtn" style="display:none;">Təmizlə</button>
  </div>

  <div id="content">
    <div class="empty">Yüklənir...</div>
  </div>
</div>

<script>
const API_BASE = 'https://kondisioner-kalkulyator-api.orxanmursudov.workers.dev';
let fullList = [];
let marginChartInstance = null;
let spendEarnChartInstance = null;

function fmt(n, d=2){
  if(!isFinite(n)) return '—';
  return n.toLocaleString('az-AZ', {minimumFractionDigits:d, maximumFractionDigits:d});
}

function setSectorFilter(sector){
  document.getElementById('sectorFilter').value = sector;
  applyFilter();
}

function applyFilter(){
  const val = document.getElementById('sectorFilter').value;
  document.getElementById('clearFilterBtn').style.display = val ? 'inline' : 'none';
  const filtered = val ? fullList.filter(c => (c.sector || c.name) === val) : fullList;
  renderDashboard(filtered);
}

async function load() {
  const contentEl = document.getElementById('content');
  try {
    const res = await fetch(`${API_BASE}/api/campaigns`);
    fullList = await res.json();
  } catch (err) {
    contentEl.innerHTML = `<div class="empty">API-yə qoşulmaq mümkün olmadı.</div>`;
    return;
  }

  if (!fullList.length) {
    contentEl.innerHTML = `<div class="empty">Hələ saxlanmış kampaniya yoxdur.<br>Kalkulyatorda ilk kampaniyanı əlavə edin.</div>`;
    return;
  }

  // ---- Süzgəci doldur (sahə varsa sahə, yoxdursa kampaniya adı) ----
  const sectors = [...new Set(fullList.map(c => c.sector || c.name).filter(Boolean))];
  if (sectors.length > 1) {
    const sel = document.getElementById('sectorFilter');
    sectors.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      sel.appendChild(opt);
    });
    document.getElementById('filterBar').style.display = 'flex';
    sel.addEventListener('change', applyFilter);
    document.getElementById('clearFilterBtn').addEventListener('click', () => setSectorFilter(''));
  }

  renderDashboard(fullList);
}

function renderDashboard(list) {
  const contentEl = document.getElementById('content');
  list = list.slice().sort((a,b) => new Date(a.date) - new Date(b.date));

  if (!list.length) {
    contentEl.innerHTML = `<div class="empty">Bu süzgəcə uyğun kampaniya tapılmadı.</div>`;
    if (marginChartInstance) { marginChartInstance.destroy(); marginChartInstance = null; }
    if (spendEarnChartInstance) { spendEarnChartInstance.destroy(); spendEarnChartInstance = null; }
    return;
  }

  const totalSpendUSD = list.reduce((s,c) => s + c.results.spendUSD, 0);
  const totalEarnUSD = list.reduce((s,c) => s + c.results.totalEarnUSD, 0);
  const avgMargin = list.reduce((s,c) => s + c.results.margin, 0) / list.length;
  const netProfit = totalEarnUSD - totalSpendUSD;

  const best = list.reduce((a,b) => (b.results.margin > a.results.margin ? b : a));
  const worst = list.reduce((a,b) => (b.results.margin < a.results.margin ? b : a));

  contentEl.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi"><div class="label">Ümumi xərc</div><div class="value">$${fmt(totalSpendUSD,0)}</div></div>
      <div class="kpi"><div class="label">Ümumi gəlir</div><div class="value">$${fmt(totalEarnUSD,0)}</div></div>
      <div class="kpi"><div class="label">Orta marja</div><div class="value ${avgMargin>=0?'good':'bad'}">${fmt(avgMargin,1)}%</div></div>
      <div class="kpi"><div class="label">Xalis mənfəət</div><div class="value ${netProfit>=0?'good':'bad'}">$${fmt(netProfit,0)}</div></div>
    </div>

    <div class="card">
      <h2>Marja trendi (${list.length} kampaniya)</h2>
      <div class="chart-wrap"><canvas id="marginChart"></canvas></div>
    </div>

    <div class="card">
      <h2>Xərc vs Gəlir</h2>
      <div class="chart-wrap"><canvas id="spendEarnChart"></canvas></div>
    </div>

    <div class="card">
      <h2>Bütün kampaniyalar</h2>
      <div style="overflow-x:auto;">
        <table>
          <thead><tr>
            <th>Ad</th><th>Tarix</th><th class="num">Marja</th><th class="num">Xərc</th><th class="num">Gəlir</th>
          </tr></thead>
          <tbody>
            ${list.slice().reverse().map(c => {
              let rowClass = '';
              let tag = '';
              if (c.id === best.id && list.length > 1) { rowClass='best'; tag='<span class="tag best">ən yaxşı</span>'; }
              else if (c.id === worst.id && list.length > 1) { rowClass='worst'; tag='<span class="tag worst">ən zəif</span>'; }
              const filterVal = c.sector || c.name;
              const sectorHtml = c.sector
                ? `<br><span class="sector-link" data-sector="${c.sector.replace(/"/g,'&quot;')}" style="color:var(--accent);font-size:10.5px;text-decoration:underline;">${c.sector}</span>`
                : '';
              const nameHtml = c.sector
                ? c.name
                : `<span class="sector-link" data-sector="${filterVal.replace(/"/g,'&quot;')}" style="text-decoration:underline;text-decoration-style:dotted;cursor:pointer;">${c.name}</span>`;
              return `
                <tr class="${rowClass}">
                  <td>${nameHtml}${sectorHtml} ${tag}</td>
                  <td>${new Date(c.date).toLocaleDateString('az-AZ')}</td>
                  <td class="num">${fmt(c.results.margin,1)}%</td>
                  <td class="num">$${fmt(c.results.spendUSD,0)}</td>
                  <td class="num">$${fmt(c.results.totalEarnUSD,0)}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
      <div style="margin-top:12px;">
        <button class="btn" id="exportBtn">📊 Excel-ə ixrac et</button>
      </div>
    </div>
  `;

  // Sahə mətninə klik → o sahəyə görə süzgəc
  contentEl.querySelectorAll('.sector-link').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      setSectorFilter(el.dataset.sector);
    });
  });

  // ---- Köhnə qrafikləri təmizləyib yenidən çəkmək ----
  if (marginChartInstance) marginChartInstance.destroy();
  if (spendEarnChartInstance) spendEarnChartInstance.destroy();

  marginChartInstance = new Chart(document.getElementById('marginChart'), {
    type: 'line',
    data: {
      labels: list.map(c => new Date(c.date).toLocaleDateString('az-AZ', {day:'2-digit', month:'2-digit'})),
      datasets: [{
        label: 'Marja (%)',
        data: list.map(c => c.results.margin),
        borderColor: '#3fb68a',
        backgroundColor: 'rgba(63,182,138,.12)',
        fill: true,
        tension: 0.3,
        pointRadius: 3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#8ea3b4', font: {size:10} }, grid: { color: '#28394a' } },
        y: { ticks: { color: '#8ea3b4', font: {size:10} }, grid: { color: '#28394a' } },
      }
    }
  });

  spendEarnChartInstance = new Chart(document.getElementById('spendEarnChart'), {
    type: 'bar',
    data: {
      labels: list.map(c => new Date(c.date).toLocaleDateString('az-AZ', {day:'2-digit', month:'2-digit'})),
      datasets: [
        { label: 'Xərc (USD)', data: list.map(c => c.results.spendUSD), backgroundColor: '#e05a4e' },
        { label: 'Gəlir (USD)', data: list.map(c => c.results.totalEarnUSD), backgroundColor: '#3fb68a' },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#e8eef2', font: {size:11} } } },
      scales: {
        x: { ticks: { color: '#8ea3b4', font: {size:10} }, grid: { display:false } },
        y: { ticks: { color: '#8ea3b4', font: {size:10} }, grid: { color: '#28394a' } },
      }
    }
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    const rows = list.map(c => ({
      'Ad': c.name, 'Sahə': c.sector || '', 'Tarix': new Date(c.date).toLocaleDateString('az-AZ'),
      'Xərc (USD)': +c.results.spendUSD.toFixed(2), 'Gəlir (USD)': +c.results.totalEarnUSD.toFixed(2),
      'Marja (%)': +c.results.margin.toFixed(1), 'Xalis mənfəət (USD)': +c.results.netProfitUSD.toFixed(2),
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Dashboard');
    XLSX.writeFile(wb, `dashboard-${new Date().toISOString().slice(0,10)}.xlsx`);
  });
}

load();
</script>
</body>
</html>
